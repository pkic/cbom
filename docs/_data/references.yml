# CBOM Reference Register — PKI Consortium CBOM Profiles Working Group
#
# Single source of truth for the references page. Add or amend entries here;
# the rendered page is generated from this data. See CONTRIBUTING-references.md.
#
# Fields:
#   id           (required) stable citation key, e.g. F1, M3, E5. Never reuse or renumber.
#   doc          (required) document/standard number or short designation
#   title        (required) full title
#   org          (required) publishing organisation
#   date         (optional) YYYY-MM-DD or YYYY-MM or YYYY
#   category     (required) formats | methodology | policy
#   jurisdiction (required) see _config.yml labels
#   status       (required) current | draft | superseded | gap
#   url          (optional) canonical link
#   tags         (optional) list of free-text tags
#   notes        (optional) why this matters for CBOM work; 1–3 sentences
#   verify       (optional) true if the entry needs confirming against a primary source

