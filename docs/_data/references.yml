  - id: A7
    doc: ASEAN — no regional framework
    title: Absence of a regional ASEAN PQC or CBOM framework
    org: ASEAN
    category: policy
    jurisdiction: asean
    status: gap
    tags: [gap, engagement]
    notes: >-
      No regional ASEAN PQC or CBOM framework exists; the ASEAN Digital Masterplan 2025
      does not mention quantum. Activity is national — Singapore leads (nationwide
      quantum-safe network; MAS quantum-safe sandbox with DBS, HSBC, OCBC and UOB), with
      Malaysia and Indonesia (BSSN) following. Recorded as an engagement opportunity for
      the working group rather than a citable reference.

