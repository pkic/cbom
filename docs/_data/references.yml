  # -------------------------------------------------- policy — Asia-Pacific
  - id: A1
    doc: CERT-In Technical Guidelines v2.0
    title: Technical Guidelines on SBOM, QBOM & CBOM, AIBOM and HBOM
    org: CERT-In / MeitY (India)
    date: 2025-07-09
    category: policy
    jurisdiction: india
    status: current
    url: https://www.cert-in.org.in/PDF/TechnicalGuidelines-on-SBOM,QBOM&CBOM,AIBOM_and_HBOM_ver2.0.pdf
    tags: [cbom, qbom, inventory]
    notes: >-
      The most CBOM-explicit national guideline published to date. Defines five BOM types;
      the CBOM is an inventory of cryptographic assets carrying metadata such as usage
      patterns and expiry, with a separate QBOM for quantum algorithms and quantum-safe
      technologies. Currently voluntary, addressed to the public sector, government,
      essential services and the software export industry. A strong candidate consumer of a
      PKIC-defined profile.

  - id: A2
    doc: MAS Circular MAS/TCRS/2024/01
