    status: current
    url: https://www.mas.gov.sg/-/media/mas-media-library/regulation/circulars/trpd/mas-quantum-advisory/mas-quantum-advisory.pdf
    tags: [inventory, finance]
    notes: >-
      Directs financial institutions to maintain an inventory of all cryptographic assets
      and identify priority assets for migration. Names no format.

  - id: A3
    doc: CSA Quantum-Safe Handbook
    title: Quantum-Safe Handbook and Quantum Readiness Index
    org: Cyber Security Agency of Singapore
    category: policy
    jurisdiction: singapore
    status: current
    url: https://www.csa.gov.sg/
    tags: [inventory, maturity]
    notes: >-
      Handbook covers discovery of cryptographic assets, risk-based prioritisation, phased
      migration, testing and post-migration monitoring. The Readiness Index is a
      five-domain self-assessment: governance, risk assessment, training and capability,
      external engagement, technology and agility.

