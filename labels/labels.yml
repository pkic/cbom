# Label scheme for the CBOM Profiles Working Group repository.
#
# Apply with labels/create-labels.sh (uses the gh CLI), or import with a label-sync tool.
# Four families: aspect (which part of the methodology), status (where a topic is in its
# lifecycle), orientation (inventory vs migration relevance), and type (kind of item),
# plus a couple of workflow helpers.

# --- Aspect: one per Section 3 aspect of the scoping document (blue) ---
- name: "aspect:objective-scope"
  color: "1D76DB"
  description: "3.1 Profile objective & scope"
- name: "aspect:identity-metadata"
  color: "1D76DB"
  description: "3.2 Profile identity & metadata"
- name: "aspect:attribute-model"
  color: "1D76DB"
  description: "3.3 Format-independent attribute model"
- name: "aspect:obligations"
  color: "1D76DB"
  description: "3.4 Obligation levels & conformance semantics"
- name: "aspect:conformance-validation"
  color: "1D76DB"
  description: "3.5 Conformance & validation"
- name: "aspect:format-mapping"
  color: "1D76DB"
  description: "3.6 Mapping to CycloneDX & SPDX (cross-cutting)"
- name: "aspect:normalisation"
  color: "1D76DB"
  description: "3.7 Vocabularies & normalisation (cross-cutting)"
- name: "aspect:layering"
  color: "1D76DB"
  description: "3.8 Relationship to SBOM/HBOM & layering"
- name: "aspect:extensibility"
  color: "1D76DB"
  description: "3.9 Extensibility & profile composition"
- name: "aspect:roadmap"
  color: "1D76DB"
  description: "3.10 Forward-looking / roadmap information"
- name: "aspect:governance"
  color: "1D76DB"
  description: "3.11 Profile governance & lifecycle"
- name: "aspect:regulatory"
  color: "1D76DB"
  description: "3.12 Regulatory & policy alignment"
- name: "aspect:templates-tooling"
  color: "1D76DB"
  description: "3.13 Templates, worked examples & tooling"

# --- Status: where the topic sits in its lifecycle (traffic light) ---
- name: "status:deliberating"
  color: "FBCA04"
  description: "Open argument — options being explored"
- name: "status:converging"
  color: "D4C5F9"
  description: "Options narrowed; proposed decision posted"
- name: "status:decided"
  color: "0E8A16"
  description: "Decision taken and recorded in /decisions"
- name: "status:blocked"
  color: "B60205"
  description: "Cannot proceed until a dependency is resolved"
- name: "status:deferred"
  color: "C2E0C6"
  description: "Parked deliberately; revisit later"

# --- Orientation: relevance to profile orientation (purple) ---
- name: "orientation:inventory"
  color: "5319E7"
  description: "Relevant to inventory-oriented profiles"
- name: "orientation:migration"
  color: "5319E7"
  description: "Relevant to migration-oriented profiles"

# --- Type: kind of item (teal/gray) ---
- name: "type:discussion"
  color: "006B75"
  description: "Open-ended deliberation"
- name: "type:decision"
  color: "006B75"
  description: "A concrete choice to be resolved"
- name: "type:editorial"
  color: "BFDADC"
  description: "Spec wording / structure, no policy change"
- name: "type:dependency"
  color: "BFDADC"
  description: "Cross-cutting item referenced by several aspects"

# --- Workflow helpers ---
- name: "needs:owner"
  color: "E99695"
  description: "No aspect owner assigned yet"
- name: "good-first-topic"
  color: "7057FF"
  description: "Self-contained; good entry point for new contributors"
